services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sensordb
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ingestion:
    build: ./services/ingestion
    environment:
      DB_URL: postgresql://admin:password@timescaledb:5432/sensordb
      REDIS_URL: redis://redis:6379
    ports:
      - "8001:8000"
    depends_on:
      - timescaledb
      - redis

  query:
    build: ./services/query
    environment:
      DB_URL: postgresql://admin:password@timescaledb:5432/sensordb
    ports:
      - "8000:8000"
    depends_on:
      - timescaledb

volumes:
  timescale_data: